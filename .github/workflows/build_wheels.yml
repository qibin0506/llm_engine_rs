name: Build and Publish

on:
  push:
    branches:
      - main
    # 只有打 tag 时才发布到 PyPI 和 GitHub Release
    # 触发命令例如：git tag v0.1.0 && git push origin v0.1.0
    tags:
      - 'v*'

jobs:
  # 1. 在各个平台构建二进制包 (Wheels)
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # 2. 构建源码包 (Source Distribution)
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # 3. 发布到 PyPI 和 GitHub Release (仅在打 tag 时执行)
  release:
    name: Release to PyPI and GitHub
    runs-on: ubuntu-latest
    # 需要等待 wheels 和 sdist 都构建成功
    needs: [build-wheels, build-sdist]
    # 仅当触发事件是 tag，且 tag 名称以 v 开头时执行
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # 下载前面步骤产生的所有包 (v4 的 merge-multiple 会把它们放进同一个 dist 目录)
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      # 发布到 PyPI
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      # (可选) 自动在 GitHub 上创建一个 Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
